<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEF TECH Glass Links</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-black text-white overflow-hidden relative">

    <!-- fondo animado flotante -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-80 h-80 bg-blue-500/20 rounded-full blur-3xl top-0 left-0 animate-pulse"></div>
        <div class="absolute w-72 h-72 bg-purple-500/20 rounded-full blur-3xl bottom-0 right-0 animate-bounce"></div>
    </div>

    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-md text-center backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-8 shadow-2xl">

            <!-- Avatar -->
            <img 
                src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"
                alt="avatar"
                class="w-24 h-24 md:w-32 md:h-32 rounded-full mx-auto object-cover border-4 border-white shadow-lg hover:rotate-6 hover:scale-110 transition duration-500"
            >

            <h1 class="text-3xl md:text-5xl font-bold mt-5">
                JEF TECH
            </h1>

            <p class="text-gray-300 mt-2 mb-8 text-sm md:text-base">
                Full Stack • Creator • Builder
            </p>

            <!-- Links -->
            <div class="space-y-4">

                <a href="https://github.com/jefrete"
                   class="block bg-white/10 backdrop-blur-lg border border-white/20 p-4 rounded-2xl hover:bg-white hover:text-black hover:translate-y-[-5px] transition duration-300">
                   GitHub
                </a>

                <a href="https://intro-jef-tech.vercel.app/"
                   class="block bg-white/10 backdrop-blur-lg border border-white/20 p-4 rounded-2xl hover:bg-blue-500 hover:text-white hover:translate-y-[-5px] transition duration-300">
                   Portfolio
                </a>

                <a href="https://instagram.com"
                   class="block bg-white/10 backdrop-blur-lg border border-white/20 p-4 rounded-2xl hover:bg-pink-500 hover:text-white hover:translate-y-[-5px] transition duration-300">
                   Instagram
                </a>

                <a href="https://linkedin.com"
                   class="block bg-white/10 backdrop-blur-lg border border-white/20 p-4 rounded-2xl hover:bg-cyan-500 hover:text-white hover:translate-y-[-5px] transition duration-300">
                   LinkedIn
                </a>

            </div>

            <footer class="mt-8 text-xs text-gray-400">
                Glass Edition ✨
            </footer>

        </div>
    </main>

    <script>
        const cards = document.querySelectorAll('a');

        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.8)';

            setTimeout(() => {
                card.style.transition = 'all 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
            }, index * 250);
        });
    </script>

</body>
</html>
