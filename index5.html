<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEF TECH Linktree</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-black via-zinc-900 to-purple-900 text-white overflow-x-hidden">

  <!-- Fondo animado -->
  <div class="fixed inset-0 flex items-center justify-center pointer-events-none">
    <div class="w-64 h-64 md:w-96 md:h-96 bg-purple-500/20 rounded-full blur-3xl animate-pulse"></div>
  </div>

  <main class="relative z-10 flex items-center justify-center min-h-screen px-4 py-10">
    <div class="w-full max-w-sm md:max-w-lg text-center">

      <!-- Perfil -->
      <div class="mb-8 animate-bounce">
        <img 
          src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"
          class="w-24 h-24 md:w-32 md:h-32 rounded-full mx-auto border-4 border-white object-cover shadow-2xl"
          alt="perfil"
        >

        <h1 class="text-3xl md:text-5xl font-bold mt-4 tracking-wide">
          JEF TECH
        </h1>

        <p class="text-gray-300 mt-2 text-sm md:text-lg">
          Developer • Creator • Neuquén 🚀
        </p>
      </div>

      <!-- Links -->
      <div class="space-y-4">

        <a href="https://github.com/jefrete"
           class="block bg-gradient-to-r from-gray-700 to-black p-4 rounded-2xl hover:scale-105 hover:rotate-1 transition duration-300 shadow-lg hover:shadow-purple-500/50">
          GitHub
        </a>

        <a href="https://intro-jef-tech.vercel.app/"
           class="block bg-gradient-to-r from-blue-500 to-cyan-500 p-4 rounded-2xl hover:scale-105 transition duration-300 shadow-lg hover:shadow-cyan-500/50">
          Portfolio
        </a>

        <a href="https://www.instagram.com/"
           class="block bg-gradient-to-r from-pink-500 to-orange-500 p-4 rounded-2xl hover:scale-105 transition duration-300 shadow-lg hover:shadow-pink-500/50">
          Instagram
        </a>

        <a href="https://www.youtube.com/"
           class="block bg-gradient-to-r from-red-500 to-red-700 p-4 rounded-2xl hover:scale-105 transition duration-300 shadow-lg hover:shadow-red-500/50">
          YouTube
        </a>

        <a href="https://wa.me/"
           class="block bg-gradient-to-r from-green-500 to-green-700 p-4 rounded-2xl hover:scale-105 transition duration-300 shadow-lg hover:shadow-green-500/50">
          WhatsApp
        </a>

      </div>

      <!-- Footer -->
      <footer class="mt-10 text-gray-400 text-xs md:text-sm">
        Made by JEF TECH ⚡
      </footer>

    </div>
  </main>

  <script>
    // efecto aparición suave
    const links = document.querySelectorAll('a');

    links.forEach((link, index) => {
      link.style.opacity = 0;
      link.style.transform = 'translateY(20px)';

      setTimeout(() => {
        link.style.transition = 'all 0.6s ease';
        link.style.opacity = 1;
        link.style.transform = 'translateY(0px)';
      }, index * 200);
    });
  </script>

</body>
</html>
