<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEF TECH Premium Links</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #111827, #000000 60%);
    }

    .floating-bg {
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .shine:hover::before {
      left: 100%;
    }
  </style>
</head>
<body class="min-h-screen text-white overflow-hidden relative">

    <!-- background premium -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="floating-bg absolute w-96 h-96 bg-purple-500/10 rounded-full blur-3xl top-10 left-10"></div>
        <div class="floating-bg absolute w-96 h-96 bg-blue-500/10 rounded-full blur-3xl bottom-10 right-10"></div>
    </div>

    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
        
        <div class="w-50 max-w-lg text-center">

            <!-- profile -->
            <div class="mb-10">
                <img 
                    src="jef-tech-logo.png"
                    alt="avatar"
                    class="w-32 h-32 md:w-48 md:h-48 rounded-full mx-auto object-cover border-4 border-white shadow-lg hover:rotate-6 hover:scale-110 transition duration-500 animate-growth"

                >

                <h1 class="text-2xl md:text-5xl font-bold mt-6 tracking-tight">
CONSTRUIMOS TECNOLOGIA                </h1>

            
            </div>

            <!-- premium links -->
            <div class="space-y-5">

                <a href="https://github.com/jefrete"
                   class="shine relative overflow-hidden block bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl hover:border-purple-400 hover:scale-105 transition duration-500">
                   <span class="text-lg font-semibold">GitHub</span>
                </a>

                <a href="https://intro-jef-tech.vercel.app/"
                   class="shine relative overflow-hidden block bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl hover:border-blue-400 hover:scale-105 transition duration-500">
                   <span class="text-lg font-semibold">Portfolio</span>
                </a>

                <a href="https://linkedin.com"
                   class="shine relative overflow-hidden block bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl hover:border-cyan-400 hover:scale-105 transition duration-500">
                   <span class="text-lg font-semibold">LinkedIn</span>
                </a>

                <a href="https://instagram.com"
                   class="shine relative overflow-hidden block bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl hover:border-pink-400 hover:scale-105 transition duration-500">
                   <span class="text-lg font-semibold">Instagram</span>
                </a>

                <a href="mailto:contacto@jeftech.com"
                   class="shine relative overflow-hidden block bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl hover:scale-105 transition duration-500 shadow-xl">
                   <span class="text-lg font-semibold">Work With Me</span>
                </a>

            </div>

            <footer class="mt-10 text-gray-500 text-sm">
                © 2026 JEF TECH
            </footer>

        </div>
    </main>

    <script>
        const links = document.querySelectorAll('a');

        links.forEach((link, index) => {
            link.style.opacity = '0';
            link.style.transform = 'translateY(40px)';

            setTimeout(() => {
                link.style.transition = 'all 0.8s ease';
                link.style.opacity = '1';
                link.style.transform = 'translateY(0px)';
            }, index * 180);
        });
    </script>

</body>
</html>
