<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEF TECH Neon Links</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black text-white overflow-hidden relative">

    <!-- partículas fake -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-72 h-72 bg-blue-500/20 rounded-full blur-3xl top-10 left-10 animate-pulse"></div>
        <div class="absolute w-72 h-72 bg-pink-500/20 rounded-full blur-3xl bottom-10 right-10 animate-bounce"></div>
        <div class="absolute w-64 h-64 bg-purple-500/20 rounded-full blur-3xl top-1/2 left-1/2 animate-spin"></div>
    </div>

    <main class="relative z-10 min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md text-center">

            <!-- avatar -->
            <div class="mb-8">
                <img
                    src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e"
                    class="w-28 h-28 md:w-32 md:h-32 rounded-full mx-auto object-cover border-4 border-cyan-400 shadow-[0_0_30px_cyan] hover:scale-110 transition duration-500"
                    alt="avatar"
                >

                <h1 class="text-4xl md:text-6xl font-bold mt-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 animate-pulse">
                    JEF TECH
                </h1>

                <p class="text-gray-300 mt-3">
                    Developer • Cyber Creator ⚡
                </p>
            </div>

            <!-- links -->
            <div class="space-y-5">

                <a href="https://github.com/jefrete"
                   class="block border border-cyan-400 p-4 rounded-xl hover:bg-cyan-400 hover:text-black hover:scale-110 transition duration-300 shadow-[0_0_20px_cyan]">
                   GitHub
                </a>

                <a href="https://intro-jef-tech.vercel.app/"
                   class="block border border-pink-400 p-4 rounded-xl hover:bg-pink-400 hover:text-black hover:scale-110 transition duration-300 shadow-[0_0_20px_pink]">
                   Portfolio
                </a>

                <a href="https://instagram.com"
                   class="block border border-yellow-400 p-4 rounded-xl hover:bg-yellow-400 hover:text-black hover:rotate-2 transition duration-300 shadow-[0_0_20px_yellow]">
                   Instagram
                </a>

                <a href="https://youtube.com"
                   class="block border border-red-500 p-4 rounded-xl hover:bg-red-500 hover:text-white hover:scale-110 transition duration-300 shadow-[0_0_20px_red]">
                   YouTube
                </a>

            </div>

            <footer class="mt-10 text-sm text-gray-400 animate-pulse">
                Neon Edition © 2026
            </footer>

        </div>
    </main>

    <script>
        const buttons = document.querySelectorAll('a');

        buttons.forEach((btn, index) => {
            btn.style.opacity = '0';
            btn.style.transform = 'translateX(-50px)';

            setTimeout(() => {
                btn.style.transition = 'all 0.8s ease';
                btn.style.opacity = '1';
                btn.style.transform = 'translateX(0px)';
            }, index * 300);
        });
    </script>

</body>
</html>
